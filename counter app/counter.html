<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="counter.css" >
    <script>
        function increase(){
            let temp = document.getElementById("count");
            let value = Number(temp.textContent);
            value++;
            temp.textContent = value;
        }
        function decrease(){
            let temp = document.getElementById("count");
            let value = Number(temp.textContent);
            value--;
            temp.textContent = value;
        }
    </script>
</head>
<body>
    <div class="container">
    <h1>Counter</h1>

    <div class="mainbox">
        <h1 id="count">0</h1>
        <button onclick="increase()">Increase</button>
        <button onclick="decrease()">Decrease</button>
    </div>
</div>
</body>
</html>
